<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meditrac</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8f9fa;">

    <nav class="navbar">
        <div class="logo-container">
            <a href="index.html" class="brand-text"><span class="brand-cursive-m">M</span>editrac</a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="index.html#about-us" class="nav-item">About Us</a>
            <a href="index.html#how-it-works" class="nav-item">How It Works</a>
            <a href="index.html#process" class="nav-item">Our Process</a>
        </div>
    </nav>

    <div class="auth-container">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Log in to your Meditrac account</p>

        <div class="toggle-buttons">
            <button class="toggle-btn active" id="show-user-btn" onclick="switchForm('user')">Regular User</button>
            <button class="toggle-btn" id="show-pharmacy-btn" onclick="switchForm('pharmacy')">Pharmacy Portal</button>
        </div>

        <p id="form-message" style="display:none; padding: 10px; border-radius: 6px; margin-top: 10px; font-weight: 600;"></p>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="e.g., john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="Your password">
            </div>
            <button type="submit" class="submit-btn" id="login-submit-btn">Log In</button>
        </form>

        <p style="margin-top: 20px; font-size: 0.9rem; color: #718096;">
            Don't have an account? <a href="register.html" style="color: #2b6cb0; font-weight: 600;">Register here</a>
        </p>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000';
        let currentAccountType = 'user';

        function switchForm(type) {
            currentAccountType = type;
            const userBtn = document.getElementById('show-user-btn');
            const pharmacyBtn = document.getElementById('show-pharmacy-btn');
            hideMessage();

            if (type === 'user') {
                userBtn.classList.add('active');
                pharmacyBtn.classList.remove('active');
            } else {
                userBtn.classList.remove('active');
                pharmacyBtn.classList.add('active');
            }
        }

        function showMessage(text, isError) {
            const msg = document.getElementById('form-message');
            msg.textContent = text;
            msg.style.display = 'block';
            msg.style.backgroundColor = isError ? '#fee2e2' : '#d1fae5';
            msg.style.color = isError ? '#991b1b' : '#065f46';
        }

        function hideMessage() {
            document.getElementById('form-message').style.display = 'none';
        }

        async function handleLogin(event) {
            event.preventDefault();
            hideMessage();

            const submitBtn = document.getElementById('login-submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            const body = {
                accountType: currentAccountType,
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const result = await response.json();

                if (!response.ok) {
                    showMessage(result.message || 'Login failed. Please try again.', true);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Log In';
                    return;
                }

                showMessage(result.message || 'Logged in successfully!', false);

                const name = encodeURIComponent(result.data.name);

                localStorage.setItem('meditrac_accountType', currentAccountType);
                localStorage.setItem('meditrac_id', result.data.id);

                setTimeout(() => {
                    if (currentAccountType === 'user') {
                        window.location.href = `user-dashboard.html?name=${name}`;
                    } else {
                        window.location.href = `pharmacy-dashboard.html?name=${name}`;
                    }
                }, 800);

            } catch (err) {
                console.error('Login request failed:', err);
                showMessage('Could not reach the server. Is the backend running on port 5000?', true);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In';
            }
        }
    </script>
</body>
</html>
