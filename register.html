<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Meditrac</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8f9fa;">

    <nav class="navbar">
        <div class="logo-container">
            <a href="index.html" class="brand-text"><span class="brand-cursive-m">M</span>editrac</a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="index.html#about-us" class="nav-item">About Us</a>
            <a href="index.html#how-it-works" class="nav-item">How It Works</a>
            <a href="index.html#process" class="nav-item">Our Process</a>
        </div>
    </nav>

    <div class="auth-container">
        <h2>Join Meditrac</h2>
        <p class="auth-subtitle">Select your account type to continue registration</p>
        
        <div class="toggle-buttons">
            <button class="toggle-btn active" id="show-user-btn" onclick="switchForm('user')">Regular User</button>
            <button class="toggle-btn" id="show-pharmacy-btn" onclick="switchForm('pharmacy')">Pharmacy Portal</button>
        </div>

        <form id="user-form" onsubmit="redirectToDashboard(event, 'user')">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="user-name" required placeholder="e.g., John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" required placeholder="e.g., john@example.com">
            </div>
            <div class="form-group">
                <label>Contact Number</label>
                <input type="tel" required placeholder="e.g., 0712345678">
            </div>
            <div class="form-group">
                <label>Location / Estate</label>
                <input type="text" required placeholder="e.g., Kilimani, Nairobi">
            </div>
            <button type="submit" class="submit-btn">Register & Log In</button>
        </form>

        <form id="pharmacy-form" class="hidden-form" onsubmit="redirectToDashboard(event, 'pharmacy')">
            <div class="form-group">
                <label>Pharmacy / Chemist Name</label>
                <input type="text" id="pharm-name" required placeholder="e.g., Halisi Pharmaceuticals">
            </div>
            <div class="form-group">
                <label>Official Email</label>
                <input type="email" required placeholder="e.g., info@halisipharmacy.co.ke">
            </div>
            <div class="form-group">
                <label>Business Contact Number</label>
                <input type="tel" required placeholder="e.g., 0722000000">
            </div>
            <div class="form-group">
                <label>Physical Location</label>
                <input type="text" required placeholder="e.g., Tom Mboya Street, Nairobi">
            </div>
            <button type="submit" class="submit-btn">Register Pharmacy Portal</button>
        </form>
    </div>

    <script>
        function switchForm(type) {
            const userForm = document.getElementById('user-form');
            const pharmacyForm = document.getElementById('pharmacy-form');
            const userBtn = document.getElementById('show-user-btn');
            const pharmacyBtn = document.getElementById('show-pharmacy-btn');
            
            if (type === 'user') {
                userForm.classList.remove('hidden-form');
                pharmacyForm.classList.add('hidden-form');
                userBtn.classList.add('active');
                pharmacyBtn.classList.remove('active');
            } else {
                userForm.classList.add('hidden-form');
                pharmacyForm.classList.remove('hidden-form');
                userBtn.classList.remove('active');
                pharmacyBtn.classList.add('active');
            }
        }

        function redirectToDashboard(event, type) {
            event.preventDefault();
            
            if (type === 'user') {
                const name = encodeURIComponent(document.getElementById('user-name').value);
                // Redirect straight to user panel with name in parameters
                window.location.href = `user-dashboard.html?name=${name}`;
            } else {
                const name = encodeURIComponent(document.getElementById('pharm-name').value);
                // Redirect straight to pharmacy panel with business name in parameters
                window.location.href = `pharmacy-dashboard.html?name=${name}`;
            }
        }
    </script>
</body>
</html>
