<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Meditrac</title>
    <link rel="icon" type="image/png" href="logos/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Extra states for the sign up / log in flow. Kept inline since
           register.css wasn't available to edit directly — move these into
           register.css whenever convenient. */
        .type-toggle { margin-top: -6px; }
        .message-box.error {
            background: #fed7d7;
            color: #822727;
            border: 1px solid #feb2b2;
        }
        .switch-hint {
            text-align: center;
            font-size: 0.85rem;
            color: #718096;
            margin-top: 10px;
        }
        .switch-hint a {
            color: #107ACA;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        #type-toggle {
            margin-bottom: 16px;
        }
        .form-group {
            margin-bottom: 8px;
        }
        .register-logo-container {
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body style="background-color: #f8f9fa;">

    <nav class="navbar">
        <div class="logo-container">
            <a href="index.html"><img class="logo" src="/logos/logo.png"></a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="index.html#about-us" class="nav-item">About Us</a>
            <a href="index.html#how-it-works" class="nav-item">How It Works</a>
            <a href="index.html#process" class="nav-item">Our Process</a>
        </div>
    </nav>

    <div class="main-auth-container">

        <div class="register-logo-container">
            <img class="register-logo" src="/logos/process-illustration.png">
        </div>

        <div class="auth-container">
          <h2 id="auth-heading">Join Meditrac</h2>
          <p class="auth-subtitle" id="auth-subtitle">Select your account type to continue registration</p>

          <div class="toggle-buttons" id="type-toggle">
            <button class="toggle-btn active" id="show-user-btn" onclick="switchAccountType('user')">Regular User</button>
            <button class="toggle-btn" id="show-pharmacy-btn" onclick="switchAccountType('pharmacy')">Pharmacy Portal</button>
          </div>

          <p class="message-box" id="form-message"></p>

          <!-- SIGN UP: Regular User -->
          <form id="signup-user-form" onsubmit="handleSignup(event, 'user')">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-user-name" required placeholder="e.g., John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signup-user-email" required placeholder="e.g., john@example.com">
            </div>
            <div class="form-group">
                <label>Location / Estate</label>
                <input type="text" id="signup-user-location" required placeholder="e.g., Kilimani, Nairobi">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-user-password" required placeholder="Create a password">
            </div>
            <button type="submit" class="submit-btn">Register & Log In</button>
          </form>

          <!-- SIGN UP: Pharmacy -->
          <form id="signup-pharmacy-form" class="hidden-form" onsubmit="handleSignup(event, 'pharmacy')">
            <div class="form-group">
                <label>Pharmacy / Chemist Name</label>
                <input type="text" id="signup-pharmacy-name" required placeholder="e.g., Halisi Pharmaceuticals">
            </div>
            <div class="form-group">
                <label>Official Email</label>
                <input type="email" id="signup-pharmacy-email" required placeholder="e.g., info@halisipharmacy.co.ke">
            </div>
            <div class="form-group">
                <label>Physical Location</label>
                <input type="text" id="signup-pharmacy-location" required placeholder="e.g., Tom Mboya Street, Nairobi">
            </div>
            <div class="form-group">
                <label>Pin Your Pharmacy on the Map</label>
                <div id="pharmacy-map" style="height: 180px; border-radius: 8px; border: 1px solid #e2e8f0;"></div>
                <small style="color:#718096; font-size:0.78rem; margin-top: 2px;">Click the map to drop a pin at your pharmacy's exact spot — this is how patients will see how far they are from you.</small>
                <input type="hidden" id="signup-pharmacy-lat">
                <input type="hidden" id="signup-pharmacy-lng">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-pharmacy-password" required placeholder="Create a password">
            </div>
            <button type="submit" class="submit-btn">Register Pharmacy Portal</button>
          </form>

          <!-- LOG IN: Regular User -->
          <form id="login-user-form" class="hidden-form" onsubmit="handleLogin(event, 'user')">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-user-email" required placeholder="e.g., john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-user-password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="submit-btn">Log In</button>
          </form>

          <!-- LOG IN: Pharmacy -->
          <form id="login-pharmacy-form" class="hidden-form" onsubmit="handleLogin(event, 'pharmacy')">
            <div class="form-group">
                <label>Official Email</label>
                <input type="email" id="login-pharmacy-email" required placeholder="e.g., info@halisipharmacy.co.ke">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pharmacy-password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="submit-btn">Log In</button>
          </form>

          <p class="switch-hint" id="switch-hint"></p>
      </div>
    </div>


    <script>
        const ACCOUNTS_KEY = 'meditrac_accounts';
        const SESSION_KEY = 'meditrac_session';

        let currentMode = 'signup';   // 'signup' | 'login'
        let currentType = 'user';     // 'user' | 'pharmacy'

        // ---------- accounts "database" (localStorage) ----------
        function loadAccounts() {
            try {
                const raw = localStorage.getItem(ACCOUNTS_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                console.warn('Could not read accounts database.', e);
                return [];
            }
        }

        function saveAccounts(list) {
            localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(list));
        }

        function findAccount(accounts, type, email) {
            return accounts.find(a => a.type === type && a.email === email) || null;
        }

        function setSession(account) {
            localStorage.setItem(SESSION_KEY, JSON.stringify({
                type: account.type,
                name: account.name,
                email: account.email
            }));
        }

        // ---------- UI state ----------
        function switchMode(mode) {
            currentMode = mode;

            if (mode === 'signup') {
                document.getElementById('auth-heading').innerText = 'Join Meditrac';
                document.getElementById('auth-subtitle').innerText = 'Select your account type to continue registration';
            } else {
                document.getElementById('auth-heading').innerText = 'Welcome Back';
                document.getElementById('auth-subtitle').innerText = 'Log in to pick up right where you left off';
            }

            clearMessage();
            updateFormVisibility();
        }

        function switchAccountType(type) {
            currentType = type;
            document.getElementById('show-user-btn').classList.toggle('active', type === 'user');
            document.getElementById('show-pharmacy-btn').classList.toggle('active', type === 'pharmacy');
            clearMessage();
            updateFormVisibility();
        }

        // ---------- pharmacy location picker (Leaflet) ----------
        let pharmacyMap = null;
        let pharmacyMarker = null;

        function initPharmacyMapIfNeeded() {
            if (pharmacyMap) {
                // Container was display:none and is now visible again — Leaflet
                // needs to be told to recalculate its size or tiles render blank/grey.
                setTimeout(() => pharmacyMap.invalidateSize(), 0);
                return;
            }

            pharmacyMap = L.map('pharmacy-map').setView([-1.2921, 36.8219], 12); // default: Nairobi CBD
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(pharmacyMap);

            pharmacyMap.on('click', (e) => setPharmacyPin(e.latlng.lat, e.latlng.lng));

            // Best-effort: recentre on the pharmacy's actual current location so
            // most pharmacies just fine-tune the pin instead of hunting for their area.
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => pharmacyMap.setView([pos.coords.latitude, pos.coords.longitude], 15),
                    () => { /* denied/unavailable — keep the default Nairobi view */ }
                );
            }

            setTimeout(() => pharmacyMap.invalidateSize(), 0);
        }

        function setPharmacyPin(lat, lng) {
            document.getElementById('signup-pharmacy-lat').value = lat;
            document.getElementById('signup-pharmacy-lng').value = lng;
            if (pharmacyMarker) {
                pharmacyMarker.setLatLng([lat, lng]);
            } else {
                pharmacyMarker = L.marker([lat, lng]).addTo(pharmacyMap);
            }
        }

        function updateFormVisibility() {
            const forms = ['signup-user-form', 'signup-pharmacy-form', 'login-user-form', 'login-pharmacy-form'];
            forms.forEach(id => document.getElementById(id).classList.add('hidden-form'));
            document.getElementById(`${currentMode}-${currentType}-form`).classList.remove('hidden-form');

            if (currentMode === 'signup' && currentType === 'pharmacy') {
                initPharmacyMapIfNeeded();
            }

            const hint = document.getElementById('switch-hint');
            if (currentMode === 'signup') {
                hint.innerHTML = `Already have an account? <a onclick="switchMode('login')">Log in instead</a>`;
            } else {
                hint.innerHTML = `Don't have an account yet? <a onclick="switchMode('signup')">Sign up instead</a>`;
            }
        }

        function showMessage(text, type) {
            const box = document.getElementById('form-message');
            box.innerText = text;
            box.className = `message-box ${type} show-message`;
            box.style.display = 'block';
        }

        function clearMessage() {
            const box = document.getElementById('form-message');
            box.innerText = '';
            box.style.display = 'none';
        }

        // ---------- handlers ----------
        function handleSignup(event, type) {
            event.preventDefault();
            clearMessage();

            const email = document.getElementById(`signup-${type}-email`).value.trim().toLowerCase();
            const name = (type === 'user'
                ? document.getElementById('signup-user-name').value
                : document.getElementById('signup-pharmacy-name').value).trim();

            const accounts = loadAccounts();

            if (findAccount(accounts, type, email)) {
                showMessage('An account with this email already exists. Please log in instead.', 'error');
                switchMode('login');
                switchAccountType(type);
                document.getElementById(`login-${type}-email`).value = email;
                return;
            }

            let latitude = null;
            let longitude = null;
            if (type === 'pharmacy') {
                const latVal = document.getElementById('signup-pharmacy-lat').value;
                const lngVal = document.getElementById('signup-pharmacy-lng').value;
                if (!latVal || !lngVal) {
                    showMessage("Please click the map to pin your pharmacy's location before registering.", 'error');
                    return;
                }
                latitude = Number(latVal);
                longitude = Number(lngVal);
            }

            const account = {
                id: `${type}_${Date.now()}`,
                type,
                name,
                email,
                location: type === 'pharmacy'
                    ? document.getElementById('signup-pharmacy-location').value.trim()
                    : document.getElementById('signup-user-location').value.trim(),
                latitude,
                longitude,
                password: type === 'pharmacy'
                    ? document.getElementById('signup-pharmacy-password').value
                    : document.getElementById('signup-user-password').value,
                createdAt: Date.now()
            };

            accounts.push(account);
            saveAccounts(accounts);
            setSession(account);
            redirectToDashboard(type, name);
        }

        function handleLogin(event, type) {
            event.preventDefault();
            clearMessage();

            const email = document.getElementById(`login-${type}-email`).value.trim().toLowerCase();
            const password = document.getElementById(`login-${type}-password`).value;
            const accounts = loadAccounts();
            const account = findAccount(accounts, type, email);

            if (!account) {
                showMessage('Account not found. Please sign up first.', 'error');
                switchMode('signup');
                switchAccountType(type);
                return;
            }

            if (account.password !== password) {
                showMessage('Incorrect password. Please try again.', 'error');
                return;
            }

            setSession(account);
            redirectToDashboard(type, account.name);
        }

        function redirectToDashboard(type, name) {
            const encodedName = encodeURIComponent(name);
            if (type === 'user') {
                window.location.href = `user-dashboard.html?name=${encodedName}`;
            } else {
                window.location.href = `pharmacy-dashboard.html?name=${encodedName}`;
            }
        }

        // init
        updateFormVisibility();
    </script>
</body>
</html>
